<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест отправки</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            text-align: center;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            margin-top: 20px;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
        }
        .error { background: #ffdddd; color: red; }
        .success { background: #ddffdd; color: green; }
        .info { background: #ddddff; color: blue; }
    </style>
</head>
<body>
    <h1>🧪 Тест отправки</h1>
    <button id="sendBtn" disabled>📤 Отправить данные боту</button>
    <div class="status info" id="status">Загрузка...</div>

    <script>
        // Ждём полной загрузки страницы
        window.onload = function() {
            const statusDiv = document.getElementById('status');
            const sendBtn = document.getElementById('sendBtn');
            
            // Проверяем, что мы внутри Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                
                // Сообщаем Telegram, что приложение готово
                tg.ready();
                
                // Растягиваем на весь экран
                tg.expand();
                
                statusDiv.innerHTML = '✅ Telegram WebApp подключен! Можете отправлять.';
                statusDiv.className = 'status success';
                sendBtn.disabled = false;
                
                sendBtn.onclick = function() {
                    const testData = {
                        type: 'test',
                        message: 'Привет от Mini App!',
                        timestamp: new Date().toISOString()
                    };
                    
                    tg.sendData(JSON.stringify(testData));
                    statusDiv.innerHTML = '✅ Данные отправлены боту!';
                    statusDiv.className = 'status success';
                    
                    tg.showPopup({
                        title: "Отправлено",
                        message: "Данные отправлены. Проверь консоль бота.",
                        buttons: [{type: "ok"}]
                    });
                    
                    setTimeout(() => tg.close(), 1500);
                };
            } else {
                // Не в Telegram
                statusDiv.innerHTML = '❌ Ошибка: Telegram не найден. Открой это приложение через Telegram бота!';
                statusDiv.className = 'status error';
                
                // Проверим, открыто ли через прямой доступ
                if (window.location.protocol === 'https:' || window.location.protocol === 'http:') {
                    statusDiv.innerHTML += '<br><br>⚠️ Ты открыл страницу в обычном браузере. Используй кнопку "Open" в Telegram боте.';
                }
            }
        };
    </script>
</body>
</html>
