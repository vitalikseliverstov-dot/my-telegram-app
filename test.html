<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест отправки</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            text-align: center;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            margin-top: 20px;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>🧪 Тест отправки</h1>
    <button id="sendBtn">📤 Отправить данные боту</button>
    <div class="status" id="status">Ожидание нажатия...</div>

    <script>
        const tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.ready();
            tg.expand();
            document.getElementById('status').innerHTML = '✅ Telegram WebApp подключен';
        } else {
            document.getElementById('status').innerHTML = '❌ Не в Telegram';
        }
        
        document.getElementById('sendBtn').onclick = () => {
            const testData = {
                type: 'test',
                message: 'Привет от Mini App!',
                timestamp: new Date().toISOString()
            };
            
            if (tg) {
                tg.sendData(JSON.stringify(testData));
                document.getElementById('status').innerHTML = '✅ Данные отправлены боту!';
                tg.showPopup({
                    title: "Отправлено",
                    message: "Данные отправлены. Проверь консоль бота.",
                    buttons: [{type: "ok"}]
                });
                setTimeout(() => tg.close(), 1500);
            } else {
                document.getElementById('status').innerHTML = '❌ Ошибка: Telegram не найден';
                alert('Открывай через Telegram!');
            }
        };
    </script>
</body>
</html>
