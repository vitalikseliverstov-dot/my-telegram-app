<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram WebApp Test</title>
</head>
<body>
    <h1>WebApp Test</h1>
    <div id="status">Проверка...</div>
    <button id="btn" onclick="sendData()">Send</button>

    <script>
        let tg = null;
        
        // Пытаемся получить WebApp разными способами
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            document.getElementById('status').innerHTML = '✅ WebApp подключен! ID: ' + (tg.initDataUnsafe?.user?.id || 'неизвестно');
        } else {
            document.getElementById('status').innerHTML = '❌ WebApp не найден. Проверь, открыто ли через Telegram.';
        }
        
        function sendData() {
            if (tg) {
                tg.sendData(JSON.stringify({ test: 'ok', time: Date.now() }));
                tg.showAlert('Отправлено!');
                tg.close();
            } else {
                alert('WebApp не инициализирован');
            }
        }
    </script>
</body>
</html>
