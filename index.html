<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Конструктор туров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            padding-bottom: 80px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .step-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Сетка 2 колонки */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Карточка товара (плитка) */
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            text-align: center;
        }

        .product-card.selected {
            border-color: var(--tg-theme-button-color, #3390ec);
            background: var(--tg-theme-button-color, #3390ec);
            color: white;
        }

        .product-card.selected .product-price,
        .product-card.selected .product-desc {
            color: rgba(255,255,255,0.85);
        }

        /* Большая картинка */
        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }

        /* Информация под картинкой */
        .product-info {
            padding: 10px 8px 12px;
        }

        .product-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .product-desc {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
        }

        /* Кнопки навигации */
        .nav-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-primary {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #000000);
        }

        /* Индикатор шагов */
        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: var(--tg-theme-hint-color, #cccccc);
            transition: all 0.3s;
        }

        .step-dot.active {
            width: 24px;
            background: var(--tg-theme-button-color, #3390ec);
        }

        .section {
            margin-bottom: 15px;
        }

        /* Для итоговой страницы */
        .summary-item {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .summary-image {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .summary-info {
            flex: 1;
        }

        .warning {
            color: #ff3b30;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="steps-indicator">
        <div class="step-dot active" data-step="1"></div>
        <div class="step-dot" data-step="2"></div>
        <div class="step-dot" data-step="3"></div>
        <div class="step-dot" data-step="4"></div>
    </div>

    <div id="step1" class="step active">
        <div class="step-title">🚗 Выберите машину</div>
        <div id="cars-list" class="grid"></div>
    </div>

    <div id="step2" class="step">
        <div class="step-title">📍 Выберите локации</div>
        <div id="locations-list" class="grid"></div>
    </div>

    <div id="step3" class="step">
        <div class="step-title">🏨 Выберите места для ночёвок</div>
        <div id="accommodations-list" class="grid"></div>
    </div>

    <div id="step4" class="step">
        <div class="step-title">✅ Ваш тур</div>
        <div id="summary"></div>
    </div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn-secondary" style="display: none;">◀ Назад</button>
        <button id="nextBtn" class="btn-primary">Далее ▶</button>
    </div>

    <script>
        // МАШИНЫ
        const cars = [
            { 
                id: 1, 
                name: "Toyota Land Cruiser", 
                desc: "Внедорожник, 5 мест", 
                price: "15 000₽/день",
                image: "images/toyota.jpg"
            },
            { 
                id: 2, 
                name: "Mitsubishi Delica", 
                desc: "Микроавтобус, 7 мест", 
                price: "12 000₽/день",
                image: "images/delica.jpg"
            },
            { 
                id: 3, 
                name: "Kia Sorento", 
                desc: "Кроссовер, 5 мест", 
                price: "8 000₽/день",
                image: "images/kia.jpg"
            },
            { 
                id: 4, 
                name: "УАЗ Буханка", 
                desc: "Для бездорожья", 
                price: "7 000₽/день",
                image: "images/uaz.jpg"
            }
        ];

        // ЛОКАЦИИ (добавим фото для каждой)
        const locations = [
            { id: 1, name: "Гора Белуха", desc: "Высочайшая точка Алтая", duration: "1 день", image: "images/belukha.jpg" },
            { id: 2, name: "Телецкое озеро", desc: "Жемчужина Алтая", duration: "2 дня", image: "images/teleckoe.jpg" },
            { id: 3, name: "Марсианские горы", desc: "Необычные красные скалы", duration: "1 день", image: "images/marsianskie.jpg" },
            { id: 4, name: "Чуйский тракт", desc: "Одна из красивейших дорог", duration: "2 дня", image: "images/chuiskiy.jpg" }
        ];

        // НОЧЁВКИ
        const accommodations = [
            { id: 1, name: "Глэмпинг \"Звездная ночь\"", desc: "Палатки с удобствами", price: "5 000₽/ночь", image: "images/glamping.jpg" },
            { id: 2, name: "База отдыха \"Тишина\"", desc: "Домики у озера", price: "3 500₽/ночь", image: "images/tishina.jpg" },
            { id: 3, name: "Гостиница \"Центральная\"", desc: "В центре города", price: "4 000₽/ночь", image: "images/central.jpg" },
            { id: 4, name: "Кемпинг \"У костра\"", desc: "Палатки, общая кухня", price: "1 500₽/ночь", image: "images/koster.jpg" }
        ];

        let selections = {
            car: null,
            locations: [],
            accommodations: []
        };

        let currentStep = 1;
        const totalSteps = 4;

        // Универсальная функция рендера карточек
        function renderGrid(containerId, items, isMultiSelect, isLocation = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '';
            items.forEach(item => {
                let isSelected;
                if (isLocation) {
                    isSelected = selections.locations.includes(item.id);
                } else if (containerId === 'cars-list') {
                    isSelected = selections.car === item.id;
                } else {
                    isSelected = selections.accommodations.includes(item.id);
                }
                
                const div = document.createElement('div');
                div.className = `product-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <img class="product-image" src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/200x200?text=Нет+фото'">
                    <div class="product-info">
                        <div class="product-title">${item.name}</div>
                        <div class="product-desc">${item.desc}</div>
                        <div class="product-price">${item.price || item.duration || ''}</div>
                    </div>
                `;
                
                div.onclick = () => {
                    if (containerId === 'cars-list') {
                        // Выбор машины (один вариант)
                        selections.car = item.id;
                        renderGrid('cars-list', cars, false);
                    } else if (containerId === 'locations-list') {
                        // Выбор локаций (несколько)
                        if (isSelected) {
                            selections.locations = selections.locations.filter(id => id !== item.id);
                        } else {
                            selections.locations.push(item.id);
                        }
                        renderGrid('locations-list', locations, true, true);
                    } else if (containerId === 'accommodations-list') {
                        // Выбор ночёвок (несколько)
                        if (isSelected) {
                            selections.accommodations = selections.accommodations.filter(id => id !== item.id);
                        } else {
                            selections.accommodations.push(item.id);
                        }
                        renderGrid('accommodations-list', accommodations, true);
                    }
                };
                container.appendChild(div);
            });
        }

        // Функция отрисовки итога
        function renderSummary() {
            const container = document.getElementById('summary');
            if (!container) return;
            
            const selectedCar = cars.find(c => c.id === selections.car);
            const selectedLocations = locations.filter(l => selections.locations.includes(l.id));
            const selectedAccommodations = accommodations.filter(a => selections.accommodations.includes(a.id));
            
            let html = '';
            
            if (selectedCar) {
                html += `
                    <div class="summary-item">
                        <img class="summary-image" src="${selectedCar.image}" onerror="this.src='https://via.placeholder.com/50x50?text=Фото'">
                        <div class="summary-info">
                            <strong>🚗 ${selectedCar.name}</strong><br>
                            ${selectedCar.price}
                        </div>
                    </div>
                `;
            } else {
                html += `<div class="warning">⚠️ Машина не выбрана</div>`;
            }
            
            if (selectedLocations.length > 0) {
                selectedLocations.forEach(loc => {
                    html += `
                        <div class="summary-item">
                            <img class="summary-image" src="${loc.image}" onerror="this.src='https://via.placeholder.com/50x50?text=Фото'">
                            <div class="summary-info">
                                <strong>📍 ${loc.name}</strong><br>
                                ${loc.duration}
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `<div class="warning">⚠️ Локации не выбраны</div>`;
            }
            
            if (selectedAccommodations.length > 0) {
                selectedAccommodations.forEach(acc => {
                    html += `
                        <div class="summary-item">
                            <img class="summary-image" src="${acc.image}" onerror="this.src='https://via.placeholder.com/50x50?text=Фото'">
                            <div class="summary-info">
                                <strong>🏨 ${acc.name}</strong><br>
                                ${acc.price}
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `<div class="warning">⚠️ Ночёвки не выбраны</div>`;
            }
            
            html += `<button id="submitTourBtn" class="btn-primary" style="margin-top: 20px;">📤 Отправить тур в Telegram</button>`;
            
            container.innerHTML = html;
            
            const submitBtn = document.getElementById('submitTourBtn');
            if (submitBtn) {
                submitBtn.onclick = () => {
                    submitTour();
                };
            }
        }
        
        function submitTour() {
            if (!selections.car) {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.showAlert("Сначала выберите машину!");
                } else {
                    alert("Сначала выберите машину!");
                }
                return;
            }
            
            const selectedCar = cars.find(c => c.id === selections.car);
            const selectedLocations = locations.filter(l => selections.locations.includes(l.id));
            const selectedAccommodations = accommodations.filter(a => selections.accommodations.includes(a.id));
            
            const tourData = {
                type: 'tour_construction',
                car: selectedCar,
                locations: selectedLocations,
                accommodations: selectedAccommodations,
                timestamp: new Date().toISOString()
            };
            
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify(tourData));
                window.Telegram.WebApp.showAlert("Тур отправлен! Бот скоро ответит.");
            } else {
                console.log("Данные тура:", tourData);
                alert("Данные тура готовы:\n" + JSON.stringify(tourData, null, 2));
            }
        }

        function updateStep() {
            for (let i = 1; i <= totalSteps; i++) {
                const step = document.getElementById(`step${i}`);
                if (step) step.classList.remove('active');
            }
            const currentStepEl = document.getElementById(`step${currentStep}`);
            if (currentStepEl) currentStepEl.classList.add('active');
            
            for (let i = 1; i <= totalSteps; i++) {
                const dot = document.querySelector(`.step-dot[data-step="${i}"]`);
                if (dot) {
                    if (i === currentStep) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                }
            }
            
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (currentStep === 1) {
                prevBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'block';
            }
            
            if (currentStep === totalSteps) {
                nextBtn.textContent = '✅ Завершить';
            } else {
                nextBtn.textContent = 'Далее ▶';
            }
            
            if (currentStep === 4) {
                renderSummary();
            }
        }
        
        function canGoNext() {
            if (currentStep === 1 && !selections.car) {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.showAlert("Выберите машину!");
                } else {
                    alert("Выберите машину!");
                }
                return false;
            }
            return true;
        }
        
        function nextStep() {
            if (!canGoNext()) return;
            if (currentStep < totalSteps) {
                currentStep++;
                updateStep();
            } else if (currentStep === totalSteps) {
                submitTour();
            }
        }
        
        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                updateStep();
            }
        }
        
        function initTelegram() {
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
                tg.enableClosingConfirmation();
            }
        }
        
        function init() {
            initTelegram();
            
            // Рендерим все сетки
            renderGrid('cars-list', cars, false);
            renderGrid('locations-list', locations, true, true);
            renderGrid('accommodations-list', accommodations, true);
            
            updateStep();
            
            document.getElementById('prevBtn').onclick = prevStep;
            document.getElementById('nextBtn').onclick = nextStep;
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
