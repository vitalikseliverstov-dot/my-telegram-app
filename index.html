<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Конструктор туров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            padding-bottom: 80px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .step-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .option-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .option-card.selected {
            border-color: var(--tg-theme-button-color, #3390ec);
            background: var(--tg-theme-button-color, #3390ec);
            color: white;
        }

        .car-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: #ddd;
        }

        .car-info {
            flex: 1;
        }

        .option-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .option-desc {
            font-size: 14px;
            opacity: 0.7;
        }

        .nav-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-primary {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #000000);
        }

        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: var(--tg-theme-hint-color, #cccccc);
            transition: all 0.3s;
        }

        .step-dot.active {
            width: 24px;
            background: var(--tg-theme-button-color, #3390ec);
        }

        .section {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="steps-indicator">
        <div class="step-dot active" data-step="1"></div>
        <div class="step-dot" data-step="2"></div>
        <div class="step-dot" data-step="3"></div>
        <div class="step-dot" data-step="4"></div>
    </div>

    <div id="step1" class="step active">
        <div class="step-title">🚗 Выберите машину</div>
        <div id="cars-list"></div>
    </div>

    <div id="step2" class="step">
        <div class="step-title">📍 Выберите локации</div>
        <div id="locations-list"></div>
    </div>

    <div id="step3" class="step">
        <div class="step-title">🏨 Выберите места для ночёвок</div>
        <div id="accommodations-list"></div>
    </div>

    <div id="step4" class="step">
        <div class="step-title">✅ Ваш тур</div>
        <div id="summary"></div>
    </div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn-secondary" style="display: none;">◀ Назад</button>
        <button id="nextBtn" class="btn-primary">Далее ▶</button>
    </div>

    <script>
        // МАШИНЫ (фото из папки images)
        const cars = [
            { 
                id: 1, 
                name: "Toyota Land Cruiser", 
                desc: "Комфортный внедорожник, 5 мест", 
                price: "15 000₽/день",
                image: "images/toyota.jpg"
            },
            { 
                id: 2, 
                name: "Mitsubishi Delica", 
                desc: "Микроавтобус, 7 мест, для компании", 
                price: "12 000₽/день",
                image: "images/delica.jpg"
            },
            { 
                id: 3, 
                name: "Kia Sorento", 
                desc: "Экономичный кроссовер, 5 мест", 
                price: "8 000₽/день",
                image: "images/kia.jpg"
            },
            { 
                id: 4, 
                name: "УАЗ Буханка", 
                desc: "Для бездорожья, настоящий вездеход", 
                price: "7 000₽/день",
                image: "images/uaz.jpg"
            }
        ];

        const locations = [
            { id: 1, name: "Гора Белуха", desc: "Высочайшая точка Алтая", duration: "1 день" },
            { id: 2, name: "Телецкое озеро", desc: "Жемчужина Алтая", duration: "2 дня" },
            { id: 3, name: "Марсианские горы", desc: "Необычные красные скалы", duration: "1 день" },
            { id: 4, name: "Чуйский тракт", desc: "Одна из самых красивых дорог мира", duration: "2 дня" }
        ];

        const accommodations = [
            { id: 1, name: "Глэмпинг \"Звездная ночь\"", desc: "Палатки со всеми удобствами", price: "5 000₽/ночь" },
            { id: 2, name: "База отдыха \"Тишина\"", desc: "Домики у озера", price: "3 500₽/ночь" },
            { id: 3, name: "Гостиница \"Центральная\"", desc: "В центре города", price: "4 000₽/ночь" },
            { id: 4, name: "Кемпинг \"У костра\"", desc: "Палатки, общая кухня", price: "1 500₽/ночь" }
        ];

        let selections = {
            car: null,
            locations: [],
            accommodations: []
        };

        let currentStep = 1;
        const totalSteps = 4;

        function renderCars() {
            const container = document.getElementById('cars-list');
            if (!container) return;
            
            container.innerHTML = '';
            cars.forEach(car => {
                const isSelected = selections.car === car.id;
                const div = document.createElement('div');
                div.className = `option-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <img class="car-image" src="${car.image}" alt="${car.name}" onerror="this.src='https://via.placeholder.com/80x80?text=Нет+фото'">
                    <div class="car-info">
                        <div class="option-title">${car.name}</div>
                        <div class="option-desc">${car.desc}</div>
                        <div class="option-desc">💰 ${car.price}</div>
                    </div>
                `;
                div.onclick = () => {
                    selections.car = car.id;
                    renderCars();
                };
                container.appendChild(div);
            });
        }

        function renderLocations() {
            const container = document.getElementById('locations-list');
            if (!container) return;
            
            container.innerHTML = '';
            locations.forEach(loc => {
                const isSelected = selections.locations.includes(loc.id);
                const div = document.createElement('div');
                div.className = `option-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="car-info">
                        <div class="option-title">${loc.name}</div>
                        <div class="option-desc">${loc.desc}</div>
                        <div class="option-desc">⏱ ${loc.duration}</div>
                    </div>
                `;
                div.onclick = () => {
                    if (isSelected) {
                        selections.locations = selections.locations.filter(id => id !== loc.id);
                    } else {
                        selections.locations.push(loc.id);
                    }
                    renderLocations();
                };
                container.appendChild(div);
            });
        }

        function renderAccommodations() {
            const container = document.getElementById('accommodations-list');
            if (!container) return;
            
            container.innerHTML = '';
            accommodations.forEach(acc => {
                const isSelected = selections.accommodations.includes(acc.id);
                const div = document.createElement('div');
                div.className = `option-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="car-info">
                        <div class="option-title">${acc.name}</div>
                        <div class="option-desc">${acc.desc}</div>
                        <div class="option-desc">💰 ${acc.price}</div>
                    </div>
                `;
                div.onclick = () => {
                    if (isSelected) {
                        selections.accommodations = selections.accommodations.filter(id => id !== acc.id);
                    } else {
                        selections.accommodations.push(acc.id);
                    }
                    renderAccommodations();
                };
                container.appendChild(div);
            });
        }

        function renderSummary() {
            const container = document.getElementById('summary');
            if (!container) return;
            
            const selectedCar = cars.find(c => c.id === selections.car);
            const selectedLocations = locations.filter(l => selections.locations.includes(l.id));
            const selectedAccommodations = accommodations.filter(a => selections.accommodations.includes(a.id));
            
            let html = '';
            
            html += `<div class="section"><strong>🚗 Машина:</strong><br>`;
            if (selectedCar) {
                html += `
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <img src="${selectedCar.image}" style="width: 60px; height: 60px; border-radius: 8px; object-fit: cover;" onerror="this.src='https://via.placeholder.com/60x60?text=Нет+фото'">
                        <div>${selectedCar.name} — ${selectedCar.price}</div>
                    </div>
                `;
            } else {
                html += `<span style="color: red;">Не выбрана!</span>`;
            }
            html += `</div><br>`;
            
            html += `<div class="section"><strong>📍 Локации (${selectedLocations.length}):</strong><br>`;
            if (selectedLocations.length > 0) {
                selectedLocations.forEach(l => {
                    html += `• ${l.name} (${l.duration})<br>`;
                });
            } else {
                html += `Не выбрано ни одной<br>`;
            }
            html += `</div><br>`;
            
            html += `<div class="section"><strong>🏨 Ночёвки (${selectedAccommodations.length}):</strong><br>`;
            if (selectedAccommodations.length > 0) {
                selectedAccommodations.forEach(a => {
                    html += `• ${a.name} — ${a.price}<br>`;
                });
            } else {
                html += `Не выбрано ни одной<br>`;
            }
            html += `</div><br>`;
            
            html += `<button id="submitTourBtn" class="btn-primary" style="margin-top: 20px;">📤 Отправить тур в Telegram</button>`;
            
            container.innerHTML = html;
            
            const submitBtn = document.getElementById('submitTourBtn');
            if (submitBtn) {
                submitBtn.onclick = () => {
                    submitTour();
                };
            }
        }
        
        function submitTour() {
            if (!selections.car) {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.showAlert("Сначала выберите машину!");
                } else {
                    alert("Сначала выберите машину!");
                }
                return;
            }
            
            const selectedCar = cars.find(c => c.id === selections.car);
            const selectedLocations = locations.filter(l => selections.locations.includes(l.id));
            const selectedAccommodations = accommodations.filter(a => selections.accommodations.includes(a.id));
            
            const tourData = {
                type: 'tour_construction',
                car: selectedCar,
                locations: selectedLocations,
                accommodations: selectedAccommodations,
                timestamp: new Date().toISOString()
            };
            
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify(tourData));
                window.Telegram.WebApp.showAlert("Тур отправлен! Бот скоро ответит.");
            } else {
                console.log("Данные тура:", tourData);
                alert("Данные тура готовы:\n" + JSON.stringify(tourData, null, 2));
            }
        }

        function updateStep() {
            for (let i = 1; i <= totalSteps; i++) {
                const step = document.getElementById(`step${i}`);
                if (step) step.classList.remove('active');
            }
            const currentStepEl = document.getElementById(`step${currentStep}`);
            if (currentStepEl) currentStepEl.classList.add('active');
            
            for (let i = 1; i <= totalSteps; i++) {
                const dot = document.querySelector(`.step-dot[data-step="${i}"]`);
                if (dot) {
                    if (i === currentStep) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                }
            }
            
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (currentStep === 1) {
                prevBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'block';
            }
            
            if (currentStep === totalSteps) {
                nextBtn.textContent = '✅ Завершить';
            } else {
                nextBtn.textContent = 'Далее ▶';
            }
            
            if (currentStep === 4) {
                renderSummary();
            }
        }
        
        function canGoNext() {
            if (currentStep === 1 && !selections.car) {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.showAlert("Выберите машину!");
                } else {
                    alert("Выберите машину!");
                }
                return false;
            }
            return true;
        }
        
        function nextStep() {
            if (!canGoNext()) return;
            if (currentStep < totalSteps) {
                currentStep++;
                updateStep();
            } else if (currentStep === totalSteps) {
                submitTour();
            }
        }
        
        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                updateStep();
            }
        }
        
        function initTelegram() {
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
                tg.enableClosingConfirmation();
            }
        }
        
        function init() {
            initTelegram();
            renderCars();
            renderLocations();
            renderAccommodations();
            updateStep();
            
            document.getElementById('prevBtn').onclick = prevStep;
            document.getElementById('nextBtn').onclick = nextStep;
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
