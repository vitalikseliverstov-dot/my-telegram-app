<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Конструктор туров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            padding-bottom: 80px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .step-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .step-subtitle {
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
            opacity: 0.7;
        }

        /* Сетка 2 колонки */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Карточка товара (плитка) */
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            text-align: center;
        }

        .product-card.selected {
            border-color: var(--tg-theme-button-color, #3390ec);
            background: var(--tg-theme-button-color, #3390ec);
            color: white;
        }

        .product-card.selected .product-price,
        .product-card.selected .product-desc {
            color: rgba(255,255,255,0.85);
        }

        .product-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.3);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }

        .product-info {
            padding: 10px 8px 12px;
        }

        .product-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .product-desc {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
        }

        .location-badge {
            display: inline-block;
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 10px;
            margin-top: 4px;
        }

        /* Кнопки навигации */
        .nav-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-primary {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #000000);
        }

        /* Индикатор шагов */
        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: var(--tg-theme-hint-color, #cccccc);
            transition: all 0.3s;
        }

        .step-dot.active {
            width: 24px;
            background: var(--tg-theme-button-color, #3390ec);
        }

        .section {
            margin-bottom: 15px;
        }

        .summary-item {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .summary-image {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .summary-info {
            flex: 1;
        }

        .warning {
            color: #ff3b30;
            text-align: center;
            padding: 20px;
        }

        .info-message {
            text-align: center;
            padding: 30px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="steps-indicator">
        <div class="step-dot active" data-step="1"></div>
        <div class="step-dot" data-step="2"></div>
        <div class="step-dot" data-step="3"></div>
        <div class="step-dot" data-step="4"></div>
    </div>

    <div id="step1" class="step active">
        <div class="step-title">🚗 Выберите машину</div>
        <div id="cars-list" class="grid"></div>
    </div>

    <div id="step2" class="step">
        <div class="step-title">📍 Выберите локации</div>
        <div class="step-subtitle">Можно выбрать несколько мест</div>
        <div id="locations-list" class="grid"></div>
    </div>

    <div id="step3" class="step">
        <div class="step-title">🏨 Выберите места для ночёвок</div>
        <div id="accommodations-subtitle" class="step-subtitle"></div>
        <div id="accommodations-list" class="grid"></div>
    </div>

    <div id="step4" class="step">
        <div class="step-title">✅ Ваш тур</div>
        <div id="summary"></div>
    </div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn-secondary" style="display: none;">◀ Назад</button>
        <button id="nextBtn" class="btn-primary">Далее ▶</button>
    </div>

    <script>
        // МАШИНЫ
        const cars = [
            { 
                id: 1, 
                name: "Toyota Land Cruiser", 
                desc: "Внедорожник, 5 мест", 
                price: "15 000₽/день",
                image: "images/toyota.jpg"
            },
            { 
                id: 2, 
                name: "Mitsubishi Delica", 
                desc: "Микроавтобус, 7 мест", 
                price: "12 000₽/день",
                image: "images/delica.jpg"
            },
            { 
                id: 3, 
                name: "Kia Sorento", 
                desc: "Кроссовер, 5 мест", 
                price: "8 000₽/день",
                image: "images/kia.jpg"
            },
            { 
                id: 4, 
                name: "УАЗ Буханка", 
                desc: "Для бездорожья", 
                price: "7 000₽/день",
                image: "images/uaz.jpg"
            }
        ];

        // ЛОКАЦИИ
        const locations = [
            { id: 1, name: "Гора Белуха", desc: "Высочайшая точка Алтая", duration: "1 день", image: "images/belukha.jpg" },
            { id: 2, name: "Телецкое озеро", desc: "Жемчужина Алтая", duration: "2 дня", image: "images/teleckoe.jpg" },
            { id: 3, name: "Марсианские горы", desc: "Необычные красные скалы", duration: "1 день", image: "images/marsianskie.jpg" },
            { id: 4, name: "Чуйский тракт", desc: "Одна из красивейших дорог", duration: "2 дня", image: "images/chuiskiy.jpg" }
        ];

        // НОЧЁВКИ с привязкой к локациям (locationId)
        const accommodations = [
            { 
                id: 1, 
                name: "Глэмпинг \"Звездная ночь\"", 
                desc: "Палатки с удобствами", 
                price: "5 000₽/ночь", 
                image: "images/glamping.jpg",
                locationId: 1  // привязан к Горе Белуха
            },
            { 
                id: 2, 
                name: "База отдыха \"Белуха\"", 
                desc: "Гостевой дом у подножия", 
                price: "4 500₽/ночь", 
                image: "images/belukha-base.jpg",
                locationId: 1  // привязан к Горе Белуха
            },
            { 
                id: 3, 
                name: "База отдыха \"Тишина\"", 
                desc: "Домики у озера", 
                price: "3 500₽/ночь", 
                image: "images/tishina.jpg",
                locationId: 2  // привязан к Телецкому озеру
            },
            { 
                id: 4, 
                name: "Кемпинг \"Озерный\"", 
                desc: "Прямо на берегу", 
                price: "2 500₽/ночь", 
                image: "images/lake-camp.jpg",
                locationId: 2  // привязан к Телецкому озеру
            },
            { 
                id: 5, 
                name: "Гостиница \"Марс\"", 
                desc: "Рядом с марсианскими горами", 
                price: "4 000₽/ночь", 
                image: "images/mars-hotel.jpg",
                locationId: 3  // привязан к Марсианским горам
            },
            { 
                id: 6, 
                name: "Кемпинг \"У костра\"", 
                desc: "Палатки, общая кухня", 
                price: "1 500₽/ночь", 
                image: "images/koster.jpg",
                locationId: 3  // привязан к Марсианским горам
            },
            { 
                id: 7, 
                name: "Гостиница \"Центральная\"", 
                desc: "В центре города", 
                price: "4 000₽/ночь", 
                image: "images/central.jpg",
                locationId: 4  // привязан к Чуйскому тракту
            },
            { 
                id: 8, 
                name: "Мотель \"Тракт\"", 
                desc: "Прямо на трассе", 
                price: "2 800₽/ночь", 
                image: "images/tract-motel.jpg",
                locationId: 4  // привязан к Чуйскому тракту
            }
        ];

        let selections = {
            car: null,
            locations: [],      // ID выбранных локаций
            accommodations: []  // ID выбранных ночёвок
        };

        let currentStep = 1;
        const totalSteps = 4;

        // Получить доступные ночёвки на основе выбранных локаций
        function getAvailableAccommodations() {
            if (selections.locations.length === 0) {
                return [];  // Если локации не выбраны — ничего не показываем
            }
            return accommodations.filter(acc => selections.locations.includes(acc.locationId));
        }

        // Функция рендера машин
        function renderCars() {
            const container = document.getElementById('cars-list');
            if (!container) return;
            
            container.innerHTML = '';
            cars.forEach(car => {
                const isSelected = selections.car === car.id;
                const div = document.createElement('div');
                div.className = `product-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <img class="product-image" src="${car.image}" alt="${car.name}" onerror="this.src='https://via.placeholder.com/200x200?text=Нет+фото'">
                    <div class="product-info">
                        <div class="product-title">${car.name}</div>
                        <div class="product-desc">${car.desc}</div>
                        <div class="product-price">${car.price}</div>
                    </div>
                `;
                div.onclick = () => {
                    selections.car = car.id;
                    renderCars();
                };
                container.appendChild(div);
            });
        }

        // Функция рендера локаций
        function renderLocations() {
            const container = document.getElementById('locations-list');
            if (!container) return;
            
            container.innerHTML = '';
            locations.forEach(loc => {
                const isSelected = selections.locations.includes(loc.id);
                const div = document.createElement('div');
                div.className = `product-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <img class="product-image" src="${loc.image}" alt="${loc.name}" onerror="this.src='https://via.placeholder.com/200x200?text=Нет+фото'">
                    <div class="product-info">
                        <div class="product-title">${loc.name}</div>
                        <div class="product-desc">${loc.desc}</div>
                        <div class="product-price">${loc.duration}</div>
                    </div>
                `;
                div.onclick = () => {
                    if (isSelected) {
                        selections.locations = selections.locations.filter(id => id !== loc.id);
                    } else {
                        selections.locations.push(loc.id);
                    }
                    renderLocations();
                    // Если уже были на шаге ночёвок — обновляем их при изменении локаций
                    if (currentStep === 3) {
                        renderAccommodations();
                    }
                };
                container.appendChild(div);
            });
        }

        // Функция рендера ночёвок (только доступные по выбранным локациям)
        function renderAccommodations() {
            const container = document.getElementById('accommodations-list');
            const subtitle = document.getElementById('accommodations-subtitle');
            if (!container) return;
            
            const availableAccommodations = getAvailableAccommodations();
            const selectedLocationNames = locations
                .filter(l => selections.locations.includes(l.id))
                .map(l => l.name)
                .join(', ');
            
            // Обновляем подзаголовок
            if (subtitle) {
                if (selections.locations.length === 0) {
                    subtitle.innerHTML = '⚠️ Сначала выберите локации на предыдущем шаге';
                    subtitle.style.color = '#ff3b30';
                } else {
                    subtitle.innerHTML = `Для выбранных локаций: ${selectedLocationNames}`;
                    subtitle.style.color = 'inherit';
                }
            }
            
            container.innerHTML = '';
            
            if (availableAccommodations.length === 0) {
                container.innerHTML = '<div class="info-message">🏔️ Для выбранных локаций пока нет предложений по ночёвкам. Вернитесь и выберите другие локации.</div>';
                return;
            }
            
            availableAccommodations.forEach(acc => {
                const isSelected = selections.accommodations.includes(acc.id);
                const relatedLocation = locations.find(l => l.id === acc.locationId);
                
                const div = document.createElement('div');
                div.className = `product-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <img class="product-image" src="${acc.image}" alt="${acc.name}" onerror="this.src='https://via.placeholder.com/200x200?text=Нет+фото'">
                    <div class="product-info">
                        <div class="product-title">${acc.name}</div>
                        <div class="product-desc">${acc.desc}</div>
                        <div class="product-price">${acc.price}</div>
                        <div class="location-badge">📍 ${relatedLocation?.name || ''}</div>
                    </div>
                `;
                div.onclick = () => {
                    if (isSelected) {
                        selections.accommodations = selections.accommodations.filter(id => id !== acc.id);
                    } else {
                        selections.accommodations.push(acc.id);
                    }
                    renderAccommodations();
                };
                container.appendChild(div);
            });
        }

        // Функция отрисовки итога
        function renderSummary() {
            const container = document.getElementById('summary');
            if (!container) return;
            
            const selectedCar = cars.find(c => c.id === selections.car);
            const selectedLocations = locations.filter(l => selections.locations.includes(l.id));
            const selectedAccommodations = accommodations.filter(a => selections.accommodations.includes(a.id));
            
            let html = '';
            
            if (selectedCar) {
                html += `
                    <div class="summary-item">
                        <img class="summary-image" src="${selectedCar.image}" onerror="this.src='https://via.placeholder.com/50x50?text=Фото'">
                        <div class="summary-info">
                            <strong>🚗 ${selectedCar.name}</strong><br>
                            ${selectedCar.price}
                        </div>
                    </div>
                `;
            } else {
                html += `<div class="warning">⚠️ Машина не выбрана</div>`;
            }
            
            if (selectedLocations.length > 0) {
                selectedLocations.forEach(loc => {
                    html += `
                        <div class="summary-item">
                            <img class="summary-image" src="${loc.image}" onerror="this.src='https://via.placeholder.com/50x50?text=Фото'">
                            <div class="summary-info">
                                <strong>📍 ${loc.name}</strong><br>
                                ${loc.duration}
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `<div class="warning">⚠️ Локации не выбраны</div>`;
            }
            
            if (selectedAccommodations.length > 0) {
                selectedAccommodations.forEach(acc => {
                    const relatedLocation = locations.find(l => l.id === acc.locationId);
                    html += `
                        <div class="summary-item">
                            <img class="summary-image" src="${acc.image}" onerror="this.src='https://via.placeholder.com/50x50?text=Фото'">
                            <div class="summary-info">
                                <strong>🏨 ${acc.name}</strong><br>
                                ${acc.price}<br>
                                <small>📍 ${relatedLocation?.name || ''}</small>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `<div class="warning">⚠️ Ночёвки не выбраны</div>`;
            }
            
            html += `<button id="submitTourBtn" class="btn-primary" style="margin-top: 20px;">📤 Отправить тур в Telegram</button>`;
            
            container.innerHTML = html;
            
            const submitBtn = document.getElementById('submitTourBtn');
            if (submitBtn) {
                submitBtn.onclick = () => {
                    submitTour();
                };
            }
        }
        
        function submitTour() {
            if (!selections.car) {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.showAlert("Сначала выберите машину!");
                } else {
                    alert("Сначала выберите машину!");
                }
                return;
            }
            
            const selectedCar = cars.find(c => c.id === selections.car);
            const selectedLocations = locations.filter(l => selections.locations.includes(l.id));
            const selectedAccommodations = accommodations.filter(a => selections.accommodations.includes(a.id));
            
            const tourData = {
                type: 'tour_construction',
                car: selectedCar,
                locations: selectedLocations,
                accommodations: selectedAccommodations,
                timestamp: new Date().toISOString()
            };
            
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify(tourData));
                window.Telegram.WebApp.showAlert("Тур отправлен! Бот скоро ответит.");
            } else {
                console.log("Данные тура:", tourData);
                alert("Данные тура готовы:\n" + JSON.stringify(tourData, null, 2));
            }
        }

        function updateStep() {
            for (let i = 1; i <= totalSteps; i++) {
                const step = document.getElementById(`step${i}`);
                if (step) step.classList.remove('active');
            }
            const currentStepEl = document.getElementById(`step${currentStep}`);
            if (currentStepEl) currentStepEl.classList.add('active');
            
            for (let i = 1; i <= totalSteps; i++) {
                const dot = document.querySelector(`.step-dot[data-step="${i}"]`);
                if (dot) {
                    if (i === currentStep) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                }
            }
            
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (currentStep === 1) {
                prevBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'block';
            }
            
            if (currentStep === totalSteps) {
                nextBtn.textContent = '✅ Завершить';
            } else {
                nextBtn.textContent = 'Далее ▶';
            }
            
            if (currentStep === 3) {
                renderAccommodations();  // Перерисовываем ночёвки при переходе на шаг 3
            }
            
            if (currentStep === 4) {
                renderSummary();
            }
        }
        
        function canGoNext() {
            if (currentStep === 1 && !selections.car) {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.showAlert("Выберите машину!");
                } else {
                    alert("Выберите машину!");
                }
                return false;
            }
            if (currentStep === 2 && selections.locations.length === 0) {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.showAlert("Выберите хотя бы одну локацию!");
                } else {
                    alert("Выберите хотя бы одну локацию!");
                }
                return false;
            }
            return true;
        }
        
        function nextStep() {
            if (!canGoNext()) return;
            if (currentStep < totalSteps) {
                currentStep++;
                updateStep();
            } else if (currentStep === totalSteps) {
                submitTour();
            }
        }
        
        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                updateStep();
            }
        }
        
        function initTelegram() {
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
                tg.enableClosingConfirmation();
            }
        }
        
        function init() {
            initTelegram();
            renderCars();
            renderLocations();
            updateStep();
            
            document.getElementById('prevBtn').onclick = prevStep;
            document.getElementById('nextBtn').onclick = nextStep;
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
